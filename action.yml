name: DevGuard
description: Run DevGuard repository hygiene and security checks from GitHub Actions.

inputs:
  path:
    description: Repository path to scan relative to the workspace.
    required: false
    default: .
  format:
    description: Primary report format to generate.
    required: false
    default: human
  min-score:
    description: Optional minimum score override passed to devguard check.
    required: false
    default: ""
  fail-on:
    description: Optional fail-on override passed to devguard check.
    required: false
    default: ""
  args:
    description: Extra raw CLI arguments appended to devguard check.
    required: false
    default: ""
  github-step-summary:
    description: Write a compact markdown summary to $GITHUB_STEP_SUMMARY.
    required: false
    default: "true"
  sarif:
    description: Generate an additional SARIF report.
    required: false
    default: "false"
  sarif-path:
    description: Path for the SARIF output when enabled or when format is sarif.
    required: false
    default: devguard.sarif

outputs:
  report-path:
    description: Path to the primary report file generated by the action.
    value: ${{ steps.run.outputs.report_path }}
  score:
    description: Final DevGuard score.
    value: ${{ steps.run.outputs.score }}
  passed:
    description: Whether the run passed DevGuard policy evaluation.
    value: ${{ steps.run.outputs.passed }}

runs:
  using: composite
  steps:
    - name: Verify cargo is available
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v cargo >/dev/null 2>&1; then
          echo "cargo was not found on PATH. Install a Rust toolchain before using this action." >&2
          exit 2
        fi

    - name: Install devguard
      shell: bash
      run: |
        set -euo pipefail
        cargo install --locked --path "$GITHUB_ACTION_PATH" --force

    - name: Run devguard
      id: run
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_MIN_SCORE: ${{ inputs['min-score'] }}
        INPUT_FAIL_ON: ${{ inputs['fail-on'] }}
        INPUT_ARGS: ${{ inputs.args }}
        INPUT_GITHUB_STEP_SUMMARY: ${{ inputs['github-step-summary'] }}
        INPUT_SARIF: ${{ inputs.sarif }}
        INPUT_SARIF_PATH: ${{ inputs['sarif-path'] }}
      run: |
        set -euo pipefail

        case "$INPUT_FORMAT" in
          human) primary_report="devguard-report.txt" ;;
          json) primary_report="devguard-report.json" ;;
          markdown) primary_report="devguard-report.md" ;;
          sarif) primary_report="$INPUT_SARIF_PATH" ;;
          *)
            echo "unsupported format: $INPUT_FORMAT" >&2
            exit 2
            ;;
        esac

        json_report=".devguard-action-report.json"

        build_cmd() {
          local format="$1"
          local output_path="${2:-}"
          local include_summary="$3"
          local cmd="devguard check --path \"$INPUT_PATH\" --format \"$format\""

          if [[ -n "$output_path" ]]; then
            cmd+=" --output \"$output_path\""
          fi
          if [[ -n "$INPUT_MIN_SCORE" ]]; then
            cmd+=" --min-score \"$INPUT_MIN_SCORE\""
          fi
          if [[ -n "$INPUT_FAIL_ON" ]]; then
            cmd+=" --fail-on \"$INPUT_FAIL_ON\""
          fi
          if [[ "$include_summary" == "true" ]]; then
            cmd+=" --github-step-summary"
          fi
          if [[ -n "$INPUT_ARGS" ]]; then
            cmd+=" $INPUT_ARGS"
          fi

          printf '%s' "$cmd"
        }

        run_cmd() {
          local cmd="$1"
          local status

          set +e
          bash -lc "$cmd"
          status=$?
          set -e

          printf '%s' "$status"
        }

        json_status="$(run_cmd "$(build_cmd json "$json_report" "$INPUT_GITHUB_STEP_SUMMARY")")"

        if [[ ! -f "$json_report" ]]; then
          echo "report_path=$primary_report" >> "$GITHUB_OUTPUT"
          exit "$json_status"
        fi

        python3 - <<'PY'
import json
import os

with open('.devguard-action-report.json', encoding='utf-8') as fh:
    data = json.load(fh)

with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
    out.write(f"score={data['score']}\n")
    out.write(f"passed={str(data['passed']).lower()}\n")
PY

        render_status=0
        sarif_status=0

        if [[ "$INPUT_FORMAT" == "json" ]]; then
          cp "$json_report" "$primary_report"
        elif [[ "$INPUT_FORMAT" == "human" ]]; then
          human_cmd="$(build_cmd human "" false)"
          set +e
          bash -lc "$human_cmd" | tee "$primary_report"
          render_status=${PIPESTATUS[0]}
          set -e
        else
          render_status="$(run_cmd "$(build_cmd "$INPUT_FORMAT" "$primary_report" false)")"
        fi

        if [[ "$INPUT_SARIF" == "true" && "$INPUT_FORMAT" != "sarif" ]]; then
          sarif_status="$(run_cmd "$(build_cmd sarif "$INPUT_SARIF_PATH" false)")"
        fi

        echo "report_path=$primary_report" >> "$GITHUB_OUTPUT"

        final_status="$json_status"
        if [[ "$render_status" -eq 2 || "$sarif_status" -eq 2 ]]; then
          final_status=2
        elif [[ "$json_status" -ne 0 || "$render_status" -ne 0 || "$sarif_status" -ne 0 ]]; then
          final_status=1
        fi

        exit "$final_status"
